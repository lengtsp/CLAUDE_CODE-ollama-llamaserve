version = 1

# ══════════════════════════════════════════════════════════════
#  Shared defaults for all models
# ══════════════════════════════════════════════════════════════
[*]
n-gpu-layers = 99
jinja        = true

# ══════════════════════════════════════════════════════════════
#  1. Qwen3.5-27B  —  Main LLM + Vision (OCR)
#     - model ID ใช้ใน API:  "Qwen3.5-27B"
#     - parameters ทั้งหมด override ต่อ request ผ่าน API body ได้
# ══════════════════════════════════════════════════════════════
[Qwen3.5-27B]
model            = /home/indows-11/my_code/model/Qwen3.5 benchmark/Qwen3.5-27B/Qwen3.5-27B-UD-Q8_K_XL.gguf
mmproj           = /home/indows-11/my_code/model/Qwen3.5 benchmark/Qwen3.5-27B/mmproj-F32.gguf
c                = 40000
top-k            = 20
min-p            = 0.0
repeat-penalty   = 1.0
n-predict        = 20000
temp             = 0.7
top-p            = 0.95
presence-penalty = 1.5
load-on-startup  = true

# ══════════════════════════════════════════════════════════════
#  1b. Qwen3.5-27B-Q8  —  Final RAG Answer (Q8 quantization)
#     - model ID ใช้ใน API:  "Qwen3.5-27B-Q8"
#     - ใช้ GGUF เดียวกับ Qwen3.5-27B แต่ parameter ต่างกัน
#     - ใช้สำหรับ final answer generation เท่านั้น
# ══════════════════════════════════════════════════════════════
[Qwen3.5-27B-Q8]
model            = /home/indows-11/my_code/model/Qwen3.5 benchmark/Qwen3.5-27B/Qwen3.5-27B-UD-Q8_K_XL.gguf
mmproj           = /home/indows-11/my_code/model/Qwen3.5 benchmark/Qwen3.5-27B/mmproj-F32.gguf

; model            = /home/indows-11/my_code/model/Qwen3.5 benchmark/_bench_35B-A3 B-Q4_K_XL.ini
; mmproj           = /home/indows-11/my_code/model/Qwen3.5 benchmark/Qwen3.5-27B/mmproj-F32.gguf



c                = 25000
top-k            = 20
min-p            = 0.0
repeat-penalty   = 1.0
n-predict        = 13000
temp             = 1.0
top-p            = 0.95
presence-penalty = 1.5
chat-template-kwargs = {"enable_thinking": false}

# ══════════════════════════════════════════════════════════════
#  2. Qwen3-Embedding-8B  —  Embedding model for RAG
#     - model ID ใช้ใน API:  "Qwen3-Embedding-8B"
#     - llama-server จะ swap อัตโนมัติเมื่อ request มา
#       (เพราะ --models-max 1  จึงโหลดได้ทีละ 1 model)
#     - embeddings = true  บอก llama-server ว่า model นี้ใช้ /v1/embeddings
#
#  TODO: ดาวน์โหลด .gguf แล้วแก้ path ด้านล่างให้ตรง
#     huggingface-cli download Qwen/Qwen3-Embedding-8B-GGUF \
#       --include "Qwen3-Embedding-8B-Q8_0.gguf" \
#       --local-dir "/home/indows-11/my_code/model/Qwen3-Embedding-8B"
# ══════════════════════════════════════════════════════════════
[Qwen3-Embedding-8B]
model      = /home/indows-11/my_code/model/Qwen3-Embedding-8B/Qwen3-Embedding-8B-Q8_0.gguf
c          = 8192
embeddings = true
